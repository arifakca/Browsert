<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browsert RTS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Browsert RTS</h1>
    <div id="hint">
      Tap a soldier or drag a rectangle to select. Tap empty ground (or right-click) to move.
      Drag from your soldier onto an enemy &mdash; or tap an enemy &mdash; to attack it.
      Share this URL to invite a friend; their 10 soldiers will join the fight.
    </div>
  </header>

  <main>
    <div id="hud">
      <div id="counts"></div>
      <div id="room"></div>
      <div id="status"></div>
    </div>
    <div id="canvas-wrap">
      <canvas id="game" width="1024" height="640"></canvas>
      <div id="banner" class="hidden"></div>
    </div>
  </main>

  <script type="module" src="./game.js"></script>
</body>
</html>
